[build]
public_url = "./"
dist = "dist"

[serve]
addresses = [ "0.0.0.0" ]
port = 8080
open = true
headers = { "Cross-Origin-Opener-Policy" = "same-origin", "Cross-Origin-Embedder-Policy" = "require-corp" }

[watch]
watch = ["src", "Cargo.toml", "index.html"]

ignore = [
  "dist",
  "target",
  "result",
  "flake.nix",
  "flake.lock",
]
